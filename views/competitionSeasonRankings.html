{% extends "skala3ma-layout.html" %}

{% block topcontent %}

{% endblock %}

{% block secondarycontent %}

{% include "competitions-menu.html" %}

<style>
    /* Rankings Layout */
    .rankings-container { max-width: 1600px; margin: 0 auto; padding: 1rem; }
    
    /* Filter Controls */
    .rankings-filters { background:linear-gradient(135deg, #e8f5e9 0%, #f1f3f4 100%); padding:1rem 1.4rem; border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:1.5rem; border-left:4px solid #53be6b; }
    .filter-bar { display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; }
    .filter-title { font-size:1.4rem; font-weight:700; color:#53be6b; display:flex; align-items:center; gap:0.5rem; white-space:nowrap; }
    .filter-title i { font-size:1.2rem; }
    .filter-select { font-size:0.9rem; padding:0.5rem 0.75rem; width:100%; max-width:380px; border:2px solid #53be6b; border-radius:8px; background:#fff; color:#53be6b; font-weight:600; cursor:pointer; transition:all 0.2s ease; }
    .filter-select:hover { background:#e8f5e9; }
    .filter-select:focus { outline:none; border-color:#53be6b; background:#fff; }
    
    /* Rankings Summary */
    .rankings-summary { background:#fff; border-radius:12px; padding:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.1); margin-bottom:2rem; }
    .summary-title { font-size:1.3rem; font-weight:700; margin-bottom:1rem; color:#333; }
    .summary-stats { display:flex; gap:2rem; flex-wrap:wrap; }
    .stat-item { flex:1 1 150px; }
    .stat-label { font-size:0.85rem; color:#666; margin-bottom:0.25rem; }
    .stat-value { font-size:1.5rem; font-weight:700; color:#53be6b; }
    
    /* Rankings Sections */
    .rankings-section { background:#fff; border-radius:12px; padding:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.1); margin-bottom:2rem; }
    .section-header { font-size:1.3rem; font-weight:700; margin-bottom:1rem; color:#333; display:flex; justify-content:space-between; align-items:center; }
    .category-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1rem; }
    .category-tab { padding:0.5rem 1rem; border-radius:8px; border:2px solid #e0e0e0; background:#fff; cursor:pointer; font-weight:600; transition:all 0.2s ease; }
    .category-tab:hover { border-color:#53be6b; background:#e8f5e9; }
    .category-tab.active { border-color:#53be6b; background:#53be6b; color:#fff; }
    
    /* Rankings Table */
    .rankings-table { width:100%; border-collapse:collapse; }
    .rankings-table thead th { background:#53be6b; color:#fff; padding:0.55rem 0.3rem; text-align:left; font-weight:600; font-size:0.9rem; position:sticky; top:0; z-index:10; }
    .rankings-table tbody td { padding:0.1rem 0rem; border-bottom:1px solid #eee; }
    .rankings-table tbody tr:hover { background:#f8f9fa; }
    .rank-cell { font-weight:700; color:#53be6b; min-width:50px; }
    .rank-cell.rank-1 { color:#ffe448; font-size:1.1rem; }
    .rank-cell.rank-2 { color:#dcc848; font-size:1.05rem; }
    .rank-cell.rank-3 { color:#b39025; font-size:1.05rem; }
    .points-cell { font-weight:700; color:#333; }
    .empty-state { text-align:center; padding:3rem; color:#999; }
    
    /* Loading State */
    .loading-spinner { text-align:center; padding:3rem; color:#999; }
    
    /* Category Section Titles */
    .category-section-title { font-size:1.1rem; font-weight:700; color:#333; margin:1.5rem 0 0.5rem; padding-bottom:0.4rem; border-bottom:2px solid #53be6b; }
    .category-section-title:first-child { margin-top:0; }

    @media print {
        .rankings-filters, nav, header, .competitions-menu-wrapper { display:none !important; }
        .rankings-container { padding:0 !important; max-width:100% !important; }
        .rankings-summary { padding:0.4rem 0.3rem !important; margin-bottom:0.3rem !important; box-shadow:none !important; border:1px solid #ccc !important; }
        .rankings-section { padding:0.4rem 0.3rem !important; margin-bottom:0.3rem !important; box-shadow:none !important; border:1px solid #ccc !important; page-break-inside:avoid; }
        .section-header { font-size:1rem !important; margin-bottom:0.3rem !important; }
        .summary-stats { gap:0.1rem !important; }
        .stat-label { font-size:0.75rem !important; }
        .stat-value { font-size:1rem !important; }
        .category-section-title { font-size:0.95rem !important; margin:1.5rem 0 0.5rem !important; padding-bottom:0.2rem !important; page-break-after:avoid; }
        .rankings-table { font-size:0.78rem !important; }
        .rankings-table thead th, .rankings-table tbody td { padding:0.1rem 0.2rem !important; }
        .rankings-table thead th { background:#53be6b !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; position:static !important; top:auto !important; z-index:auto !important; }
        .rankings-table thead { display:table-row-group !important; }
        .rank-cell.rank-1, .rank-cell.rank-2, .rank-cell.rank-3 { font-size:0.85rem !important; }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .rankings-container { padding:0.5rem; }
        .rankings-filters { padding:0.75rem 0.85rem; margin-bottom:1rem; }
        .filter-bar { flex-direction:column; align-items:flex-start; gap:0.5rem; }
        .filter-title { font-size:1.1rem; }
        .filter-select { font-size:0.85rem; padding:0.45rem 0.6rem; width:100%; max-width:100%; }
        
        .rankings-summary, .rankings-section { padding:1rem 0.75rem; margin-bottom:1rem; }
        .section-header { font-size:1.1rem; flex-direction:column; align-items:flex-start; gap:0.5rem; }
        .category-tabs { gap:0.3rem; }
        .category-tab { padding:0.4rem 0.7rem; font-size:0.85rem; }
        
        .rankings-table { font-size:0.8rem; }
        .rankings-table thead th, .rankings-table tbody td { padding:0.5rem 0.3rem; }
        .summary-stats { gap:0.75rem; flex-wrap:wrap; }
        .stat-item { flex:1 1 40%; text-align:center; }
        .stat-value { font-size:1.2rem; }
    }
</style>

<div class="rankings-container">
    
    <!-- Filter Controls -->
    <div class="rankings-filters">
        <div class="filter-bar">
            <div class="filter-title">
                <i class="bi bi-trophy-fill"></i>
                <span data-translate-key="Rankings">Rankings</span>
            </div>
            <select id="competitionFilter" class="filter-select">
                <option value="">Select Competition</option>
            </select>
        </div>
    </div>
    
    <!-- Rankings Summary -->
    <div id="rankingsSummary" class="rankings-summary" style="display:none;">
        <div class="summary-title"><span data-translate-key="season_summary">Season Summary</span> <span id="summarySeasonName"></span></div>
        <div class="summary-stats">
            <div class="stat-item">
                <div class="stat-label" data-translate-key="competitions_count">Competitions</div>
                <div class="stat-value" id="competitionsCount">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label" data-translate-key="competitors">Competitors</div>
                <div class="stat-value" id="competitorsTotal">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label" data-translate-key="men">Men</div>
                <div class="stat-value" id="competitorsM">-</div>
            </div>
            <div class="stat-item">
                <div class="stat-label" data-translate-key="women">Women</div>
                <div class="stat-value" id="competitorsF">-</div>
            </div>
        </div>
    </div>
    
    <!-- Club Rankings Section -->
    <div id="clubRankingsSection" class="rankings-section" style="display:none;">
        <h3 class="section-header">
            <span data-translate-key="club_leaderboard">Club Rankings</span>
        </h3>
        <div id="clubRankingsContent">
            <div class="loading-spinner">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Individual Rankings Section -->
    <div id="individualRankingsSection" class="rankings-section" style="display:none;">
        <h3 class="section-header">
            <span data-translate-key="individual_rankings">Individual Rankings</span>
        </h3>
        <div class="category-tabs" id="categoryTabs"></div>
        <div id="individualRankingsContent">
            <div class="loading-spinner">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
    
</div>

<script>
(function() {
    'use strict';
    
    // State management
    const state = {
        currentSeason: null,
        currentType: '',
        rankingsData: null,
        seasonTypes: []
    };
    
    // Compute season label from date (Sept = start of new season)
    function computeSeason(dateStr) {
        if (!dateStr) return null;
        const date = new Date(dateStr);
        const year = date.getFullYear();
        const month = date.getMonth() + 1; // 1-12
        
        // Season runs Sept-June: if month >= 9, season is year/year+1, else (year-1)/year
        if (month >= 9) {
            return `${year}-${year + 1}`;
        } else {
            return `${year - 1}-${year}`;
        }
    }
    
    // Get unique season+type pairs from competitions
    function extractSeasonTypes(competitions) {
        const seen = new Set();
        const pairs = [];
        competitions.forEach(comp => {
            const season = computeSeason(comp.date);
            const type = comp.competition_type;
            if (season && type) {
                const key = `${season}:${type}`;
                if (!seen.has(key)) {
                    seen.add(key);
                    pairs.push({ season, type });
                }
            }
        });
        pairs.sort((a, b) => {
            if (b.season !== a.season) return b.season.localeCompare(a.season);
            return a.type.localeCompare(b.type); // adult before ado
        });
        return pairs;
    }
    
    // Show loading state in all sections
    function showLoading() {
        const spinnerHTML = '<div class="loading-spinner"><div class="spinner-border text-success" role="status"><span class="visually-hidden">Loading...</span></div><p style="margin-top:0.5rem;color:#999;">Loading rankings...</p></div>';
        document.getElementById('clubRankingsContent').innerHTML = spinnerHTML;
        document.getElementById('individualRankingsContent').innerHTML = spinnerHTML;
        document.getElementById('categoryTabs').innerHTML = '';
        // Reset summary values
        document.getElementById('competitionsCount').textContent = '-';
        document.getElementById('competitorsTotal').textContent = '-';
        document.getElementById('competitorsM').textContent = '-';
        document.getElementById('competitorsF').textContent = '-';
    }
    
    // Load rankings data
    async function loadRankings() {
        if (!state.currentSeason) {
            document.getElementById('rankingsSummary').style.display = 'none';
            document.getElementById('clubRankingsSection').style.display = 'none';
            document.getElementById('individualRankingsSection').style.display = 'none';
            return;
        }
        
        // Show sections with loading state immediately
        document.getElementById('rankingsSummary').style.display = 'block';
        document.getElementById('clubRankingsSection').style.display = 'block';
        document.getElementById('individualRankingsSection').style.display = 'block';
        const sel = document.getElementById('competitionFilter');
        document.getElementById('summarySeasonName').textContent = sel.options[sel.selectedIndex]?.text || state.currentSeason;
        showLoading();
        
        try {
            const url = `/api1/season/${state.currentSeason}/rankings${state.currentType ? '?competition_type=' + state.currentType : ''}`;
            const data = await apiFetchJson(url);
            
            state.rankingsData = data;
            
            // Update summary
            document.getElementById('competitionsCount').textContent = data.competitions_count || 0;
            document.getElementById('competitorsTotal').textContent = data.competitors_total || 0;
            document.getElementById('competitorsM').textContent = data.competitors_m || 0;
            document.getElementById('competitorsF').textContent = data.competitors_f || 0;
            
            // Render rankings
            renderClubRankings(data.club || []);
            renderIndividualRankings(data.individual || {});
            
        } catch (error) {
            console.error('Error loading rankings:', error);
            document.getElementById('clubRankingsContent').innerHTML = 
                '<div class="empty-state"><p data-translate-key="error_loading_rankings">Error loading rankings</p></div>';
            document.getElementById('individualRankingsContent').innerHTML = 
                '<div class="empty-state"><p data-translate-key="error_loading_rankings">Error loading rankings</p></div>';
        }
    }
    
    // Render club rankings
    function renderClubRankings(clubs) {
        const content = document.getElementById('clubRankingsContent');
        
        if (!clubs || clubs.length === 0) {
            content.innerHTML = '<div class="empty-state"><p data-translate-key="no_club_rankings">No club rankings available</p></div>';
            return;
        }
        
        let tableHTML = `
            <table class="rankings-table">
                <thead>
                    <tr>
                        <th data-translate-key="rank">Rank</th>
                        <th data-translate-key="club">Club</th>
                        <th data-translate-key="points">Points</th>
                        <th data-translate-key="total_participants">Participants</th>
                        <th>F</th>
                        <th>M</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        clubs.forEach(club => {
            const rankClass = club.rank <= 3 ? `rank-${club.rank}` : '';
            const clubLink = club.gymid 
                ? `<a href="/gyms/${escapeHtml(club.gymid)}" style="color:inherit;text-decoration:none;"><strong>${escapeHtml(club.club)}</strong></a>`
                : `<strong>${escapeHtml(club.club)}</strong>`;
            tableHTML += `
                <tr>
                    <td class="rank-cell ${rankClass}">${club.rank}</td>
                    <td>${clubLink}</td>
                    <td class="points-cell">${club.points}</td>
                    <td>${club.total_participants}</td>
                    <td>${club.participants_f}</td>
                    <td>${club.participants_m}</td>
                </tr>
            `;
        });
        
        tableHTML += '</tbody></table>';
        content.innerHTML = tableHTML;
    }
    
    // Render individual rankings - all categories stacked
    function renderIndividualRankings(individual) {
        const tabsContainer = document.getElementById('categoryTabs');
        const content = document.getElementById('individualRankingsContent');
        tabsContainer.innerHTML = '';

        const genders = Object.keys(individual).sort().reverse(); // M, F order (men first)

        if (genders.length === 0) {
            content.innerHTML = '<div class="empty-state"><p data-translate-key="no_individual_rankings">No individual rankings available</p></div>';
            return;
        }

        const compType = state.currentType || (state.rankingsData && state.rankingsData.competition_type) || 'adult';
        let html = '';

        genders.forEach(gender => {
            const genderLabel = gender === 'F' ? getTranslation('women') : getTranslation('men');
            const categories = Object.keys(individual[gender]).sort().reverse(); // oldest first (2=Diamond, 1=Titan, 0=Senior)
            categories.forEach(category => {
                const climbers = individual[gender][category];
                const ageType = climbers && climbers.length > 0 ? climbers[0].age_category_type : null;
                const categoryLabel = getCategoryLabel(category, ageType, compType);
                html += `<h4 class="category-section-title">${genderLabel} – ${categoryLabel}</h4>`;
                html += buildCategoryTable(climbers);
            });
        });

        content.innerHTML = html;
    }
    
    // Build HTML table for a category ranking
    function buildCategoryTable(climbers) {
        if (!climbers || climbers.length === 0) {
            return '<div class="empty-state"><p data-translate-key="no_rankings_category">No rankings for this category</p></div>';
        }
        
        let tableHTML = `
            <table class="rankings-table">
                <thead>
                    <tr>
                        <th data-translate-key="rank">Rank</th>
                        <th data-translate-key="name">Name</th>
                        <th data-translate-key="club">Club</th>
                        <th data-translate-key="points">Points</th>
                        <th data-translate-key="participations">Participations</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        climbers.forEach(climber => {
            const rankClass = climber.rank <= 3 ? `rank-${climber.rank}` : '';
            const fullName = `${climber.firstname} ${climber.lastname}`;
            tableHTML += `
                <tr>
                    <td class="rank-cell ${rankClass}">${climber.rank}</td>
                    <td><strong>${escapeHtml(fullName)}</strong></td>
                    <td>${escapeHtml(climber.club)}</td>
                    <td class="points-cell">${climber.total_points}</td>
                    <td>${climber.participations}</td>
                </tr>
            `;
        });
        
        tableHTML += '</tbody></table>';
        return tableHTML;
    }
    
    // Get category label
    function getCategoryLabel(category, ageType, compType) {
        if (ageType && compType) {
            const levelNum = category[0]; // '0', '1', or '2'
            const key = `competition_category_${ageType}_${compType}_${levelNum}`;
            const label = getTranslation(key);
            if (label && label !== key) return label;
        }
        // Fallback to old gender-based keys
        const categoryMap = {
            '0F': getTranslation('competition_category_women_senior'),
            '1F': getTranslation('competition_category_women_titan'),
            '2F': getTranslation('competition_category_women_diamond'),
            '0M': getTranslation('competition_category_men_senior'),
            '1M': getTranslation('competition_category_men_titan'),
            '2M': getTranslation('competition_category_men_diamond')
        };
        return categoryMap[category] || category;
    }
    
    // Initialize filters
    function initializeFilters() {
        const select = document.getElementById('competitionFilter');
        select.innerHTML = '<option value="">Select Competition</option>';
        state.seasonTypes.forEach(({ season, type }) => {
            const option = document.createElement('option');
            option.value = `${season}:${type}`;
            const typeLabel = getTranslation(`competition_type_${type}`);
            option.textContent = `FSGT IDF ${typeLabel} ${season}`;
            select.appendChild(option);
        });

        // Default to current season, prefer adult type
        const today = new Date();
        const currentSeason = computeSeason(today.toISOString().split('T')[0]);
        const defaultPair = state.seasonTypes.find(p => p.season === currentSeason && p.type === 'adult')
            || state.seasonTypes.find(p => p.season === currentSeason)
            || state.seasonTypes[0];
        if (defaultPair) {
            select.value = `${defaultPair.season}:${defaultPair.type}`;
            state.currentSeason = defaultPair.season;
            state.currentType = defaultPair.type;
        }

        select.addEventListener('change', (e) => {
            const [season, type] = e.target.value ? e.target.value.split(':') : [null, ''];
            state.currentSeason = season || null;
            state.currentType = type || '';
            loadRankings();
        });
    }
    
    // Utility functions
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // Load data and initialize
    async function initialize() {
        try {
            // Get all competitions to extract seasons
            const competitions = await apiFetchJson('/api1/competition/list');
            state.seasonTypes = extractSeasonTypes(competitions);
            
            initializeFilters();
            
            // Load rankings if season is selected
            if (state.currentSeason) {
                await loadRankings();
            }
            
        } catch (error) {
            console.error('Error initializing:', error);
            document.querySelector('.rankings-container').innerHTML = 
                '<div class="empty-state"><h3 data-translate-key="error_loading_dashboard">Error loading page</h3></div>';
        }
    }
    
    // Start when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }
    
})();
</script>

{% endblock %}
