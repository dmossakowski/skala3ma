{% extends "skala3ma-layout.html" %}

{% block topcontent %}

{% endblock %}

	{% block secondarycontent %}

    {% include "competitions-menu.html" %}

<style>
    /* Dashboard Layout */
    .dashboard-container { max-width: 1400px; margin: 0 auto; padding: 1rem; }
    
    /* Filter Controls */
    .dashboard-filters { background:#f1f3f4; padding:1rem 1.2rem; border-radius:14px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:1.5rem; }
    .filter-row { display:flex; flex-wrap:wrap; gap:1rem; align-items:center; }
    .filter-group { flex:1 1 200px; }
    .filter-label { font-size:0.85rem; font-weight:600; margin-bottom:0.35rem; color:#555; }
    .filter-select { font-size:0.9rem; padding:0.5rem 0.75rem; width:100%; border:2px solid #53be6b; border-radius:8px; background:#fff; color:#53be6b; font-weight:600; cursor:pointer; transition:all 0.2s ease; }
    .filter-select:hover { background:#e8f5e9; }
    .filter-select:focus { outline:none; border-color:#53be6b; background:#fff; }
    
    /* Type Toggle Buttons */
    .type-toggle-group { display:flex; gap:0.5rem; }
    .type-toggle-btn { font-size:0.9rem; padding:0.6rem 1.2rem; border:2px solid #53be6b; border-radius:8px; font-weight:600; cursor:pointer; background:#fff; color:#53be6b; transition:all 0.2s ease; }
    .type-toggle-btn:hover { background:#e8f5e9; }
    .type-toggle-btn.active { background:#53be6b; color:#fff; }
    
    /* Carousel Styles */
    .dashboard-carousel { margin-bottom:2rem; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .carousel-item-content { position:relative; min-height:400px; display:flex; align-items:center; justify-content:center; }
    .carousel-affiche { width:100%; height:500px; object-fit:contain; background:#f8f9fa; cursor:pointer; transition:opacity 0.2s ease; }
    .carousel-affiche:hover { opacity:0.9; }
    .carousel-status-badge { position:absolute; top:1rem; left:1rem; padding:0.5rem 1rem; border-radius:8px; font-size:0.9rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; pointer-events:none; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .carousel-status-badge.status-created { background:#9e9e9e; color:#fff; }
    .carousel-status-badge.status-open { background:#2196f3; color:#fff; }
    .carousel-status-badge.status-inprogress { background:#ff9800; color:#fff; }
    .carousel-status-badge.status-scoring { background:#9c27b0; color:#fff; }
    .carousel-status-badge.status-closed { background:#f44336; color:#fff; }
    .carousel-status-badge.status-archived { background:#607d8b; color:#fff; }
    .carousel-status-badge.status-future { background:#4caf50; color:#fff; }
    .carousel-info-overlay { position:absolute; bottom:0; left:0; right:0; background:linear-gradient(transparent,  rgba(0,0,0,0.85)); padding:2rem 1.5rem 1.5rem; color:#fff; pointer-events:none; }
    .carousel-title { font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; }
    .carousel-details { font-size:1rem; opacity:0.95; }
    .carousel-empty { text-align:center; padding:4rem 2rem; color:#999; }
    .carousel-control-prev, .carousel-control-next { width:50px; opacity:0.9; }
    .carousel-control-prev:hover, .carousel-control-next:hover { opacity:1; }
    .carousel-control-prev-icon, .carousel-control-next-icon { width:2.5rem; height:2.5rem; background-color:rgba(0,0,0,0.3); border-radius:50%; padding:0.5rem; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
    .carousel-control-prev-icon:hover, .carousel-control-next-icon:hover { background-color:rgba(80, 79, 79, 0.8); }
    
    /* Leaderboard */
    .leaderboard-section { background:#fff; border-radius:12px; padding:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.1); margin-bottom:2rem; }
    .leaderboard-header { font-size:1.3rem; font-weight:700; margin-bottom:1rem; color:#333; }
    .leaderboard-table { width:100%; border-collapse:collapse; }
    .leaderboard-table thead th { background:#53be6b; color:#fff; padding:0.75rem 0.5rem; text-align:left; font-weight:600; font-size:0.9rem; }
    .leaderboard-table tbody td { padding:0.75rem 0.5rem; border-bottom:1px solid #eee; }
    .leaderboard-table tbody tr:hover { background:#f8f9fa; }
    .leaderboard-rank { font-weight:700; color:#53be6b; }
    .leaderboard-empty { text-align:center; padding:2rem; color:#999; }
    
    /* Competition Grid */
    .competitions-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1.5rem; }
    .competition-card { background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,.08); transition:all 0.2s ease; cursor:pointer; }
    .competition-card:hover { box-shadow:0 6px 16px rgba(0,0,0,.15); transform:translateY(-4px); }
    .competition-affiche { width:100%; height:200px; object-fit:cover; background:#f1f3f4; }
    .competition-body { padding:1rem; }
    .competition-title { font-size:1.1rem; font-weight:700; margin-bottom:0.5rem; color:#333; }
    .competition-meta { font-size:0.9rem; color:#666; margin-bottom:0.25rem; }
    .competition-badge { display:inline-block; font-size:0.75rem; padding:0.25rem 0.6rem; border-radius:6px; background:#e3f2fd; color:#1976d2; font-weight:600; margin-top:0.5rem; }
    .competition-badge.adult { background:#fff3e0; color:#e65100; }
    .competition-badge.ado { background:#f3e5f5; color:#7b1fa2; }
    
    /* Loading & Empty States */
    .loading-spinner { text-align:center; padding:3rem; color:#999; }
    .empty-state { text-align:center; padding:3rem 2rem; color:#999; }
    
    /* Responsive */
    @media (max-width: 768px) {
        .dashboard-container { padding:0.5rem; }
        .dashboard-filters { padding:0.75rem 0.85rem; margin-bottom:1rem; }
        .filter-row { flex-direction:column; gap:0.6rem; }
        .filter-group { flex:1 1 auto; min-width:100%; }
        .filter-label { font-size:0.8rem; margin-bottom:0.25rem; }
        .filter-select { font-size:0.85rem; padding:0.45rem 0.6rem; width:100%; }
        .type-toggle-group { width:100%; display:flex; gap:0.4rem; }
        .type-toggle-btn { flex:1 1 0; min-width:0; text-align:center; padding:0.5rem 0.3rem; font-size:0.8rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        
        .dashboard-carousel { margin-bottom:1rem; }
        .carousel-item-content { min-height:300px; }
        .carousel-affiche { height:300px; object-fit:cover; }
        .carousel-status-badge { top:0.5rem; left:0.5rem; padding:0.35rem 0.7rem; font-size:0.7rem; letter-spacing:0.3px; }
        .carousel-info-overlay { padding:0.5rem 0.75rem 3rem; background:linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.7) 40%, rgba(0,0,0,0.95)); }
        .carousel-title { font-size:0.95rem; margin-bottom:0.2rem; line-height:1.4; }
        .carousel-details { font-size:0.8rem; line-height:1.2; }
        .carousel-details div { margin-bottom:0.05rem; }
        .carousel-details .btn { padding:0.4rem 0.8rem; font-size:0.85rem; margin-top:0.5rem; }
        
        .leaderboard-section { padding:1rem 0.75rem; margin-bottom:1rem; }
        .leaderboard-header { font-size:1.1rem; margin-bottom:0.75rem; }
        .leaderboard-table { font-size:0.75rem; }
        .leaderboard-table thead th, .leaderboard-table tbody td { padding:0.4rem 0.25rem; }
        
        .competitions-grid { grid-template-columns:1fr; gap:1rem; }
        .competition-card { margin-bottom:0; }
        .competition-affiche { height:160px; }
        .competition-body { padding:0.75rem 0.85rem; }
        .competition-title { font-size:0.95rem; margin-bottom:0.4rem; }
        .competition-meta { font-size:0.8rem; margin-bottom:0.2rem; }
        .competition-badge { font-size:0.7rem; padding:0.2rem 0.5rem; }
    }
</style>

<div class="dashboard-container">
    
    <!-- Filter Controls -->
    <div class="dashboard-filters">
        <div class="filter-row">
            <div class="filter-group">
                <div class="filter-label" data-translate-key="Season">Season</div>
                <select id="seasonFilter" class="filter-select">
                    <option value="all" data-translate-key="all_seasons">All Seasons</option>
                </select>
            </div>
            <div class="filter-group">
                <div class="filter-label" data-translate-key="competition_type">Competition Type</div>
                <div class="type-toggle-group">
                    <button class="type-toggle-btn active" data-type="all" data-translate-key="all">All</button>
                    <button class="type-toggle-btn" data-type="adult" data-translate-key="competition_type_adult">Adult</button>
                    <button class="type-toggle-btn" data-type="ado" data-translate-key="competition_type_ado">Ado</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Carousel Section -->
    <div class="dashboard-carousel">
        <div id="competitionCarousel" class="carousel slide" data-bs-ride="false">
            <div class="carousel-indicators" id="carouselIndicators"></div>
            <div class="carousel-inner" id="carouselInner">
                <div class="carousel-item active">
                    <div class="carousel-item-content">
                        <div class="loading-spinner">
                            <div class="spinner-border text-success" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#competitionCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#competitionCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Next</span>
            </button>
        </div>
    </div>
    
    <!-- Leaderboard Section -->
    <div class="leaderboard-section">
        <h3 class="leaderboard-header" data-translate-key="club_leaderboard">Club Leaderboard</h3>
        <div id="leaderboardContent">
            <div class="loading-spinner">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Competition Grid -->
    <div id="competitionsGrid" class="competitions-grid">
        <div class="loading-spinner">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>
    
</div>

<script>
(function() {
    'use strict';
    
    // State management
    const state = {
        allCompetitions: [],
        filteredCompetitions: [],
        currentSeason: 'all',
        currentType: 'all',
        seasons: []
    };
    
    // Compute season label from date (Sept = start of new season)
    function computeSeason(dateStr) {
        if (!dateStr) return null;
        const date = new Date(dateStr);
        const year = date.getFullYear();
        const month = date.getMonth() + 1; // 1-12
        
        // Season runs Sept-June: if month >= 9, season is year/year+1, else (year-1)/year
        if (month >= 9) {
            return `${year}-${year + 1}`;
        } else {
            return `${year - 1}-${year}`;
        }
    }
    
    // Get unique seasons from competitions
    function extractSeasons(competitions) {
        const seasonSet = new Set();
        competitions.forEach(comp => {
            const season = computeSeason(comp.date);
            if (season) seasonSet.add(season);
        });
        return Array.from(seasonSet).sort().reverse(); // Most recent first
    }
    
    // Filter competitions based on current state
    function filterCompetitions() {
        let filtered = state.allCompetitions;
        
        // Filter by season
        if (state.currentSeason !== 'all') {
            filtered = filtered.filter(comp => computeSeason(comp.date) === state.currentSeason);
        }
        
        // Filter by type
        if (state.currentType !== 'all') {
            filtered = filtered.filter(comp => comp.competition_type === state.currentType);
        }
        
        state.filteredCompetitions = filtered;
        return filtered;
    }
    
    // Populate carousel with competitions (upcoming first, then past)
    async function updateCarousel() {
        const filtered = state.filteredCompetitions;
        const inner = document.getElementById('carouselInner');
        const indicators = document.getElementById('carouselIndicators');
        
        inner.innerHTML = '';
        indicators.innerHTML = '';
        
        if (filtered.length === 0) {
            inner.innerHTML = `
                <div class="carousel-item active">
                    <div class="carousel-empty">
                        <h4 data-translate-key="no_competitions_found">No competitions found</h4>
                        <p data-translate-key="try_adjusting_filters">Try adjusting your filters</p>
                    </div>
                </div>
            `;
            return;
        }
        
        // Sort all competitions by date (earliest to latest)
        const sortedCompetitions = [...filtered].sort((a, b) => new Date(a.date) - new Date(b.date));
        
        // Find the first upcoming competition index
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        let defaultActiveIndex = sortedCompetitions.findIndex(comp => new Date(comp.date) >= today);
        
        // If no upcoming competitions, default to the last (most recent past) competition
        if (defaultActiveIndex === -1) {
            defaultActiveIndex = sortedCompetitions.length - 1;
        }
        
        sortedCompetitions.forEach((comp, index) => {
            // Create carousel item
            const item = document.createElement('div');
            item.className = `carousel-item ${index === defaultActiveIndex ? 'active' : ''}`;
            
            // Determine if this is the next upcoming competition
            const compDate = new Date(comp.date);
            const isNextUpcoming = (index === defaultActiveIndex && compDate >= today);
            
            // Get status info
            const statusMap = {
                0: { key: 'competition_status_0', class: 'status-created' },
                1: { key: 'competition_status_1', class: 'status-open' },
                2: { key: 'competition_status_2', class: 'status-inprogress' },
                3: { key: 'competition_status_3', class: 'status-scoring' },
                4: { key: 'competition_status_4', class: 'status-closed' },
                5: { key: 'competition_status_archived', class: 'status-archived' },
                6: { key: 'competition_status_future', class: 'status-future' }
            };
            
            // Use "upcoming" for the next upcoming competition, otherwise show status
            let statusLabel, statusClass;
            if (isNextUpcoming) {
                statusLabel = getTranslation('upcoming');
                statusClass = 'status-future';
            } else {
                const status = comp.status !== undefined ? comp.status : 0;
                const statusInfo = statusMap[status] || statusMap[0];
                statusLabel = getTranslation(statusInfo.key);
                statusClass = statusInfo.class;
            }
            
            item.innerHTML = `
                <div class="carousel-item-content">
                    <img src="/image/${comp.id}" class="carousel-affiche" alt="${escapeHtml(comp.title)}" onerror="this.src='/public/images/placeholder-competition.jpg'" data-url="${comp.url}">
                    <div class="carousel-status-badge ${statusClass}">${statusLabel}</div>
                    <div class="carousel-info-overlay">
                        <div class="carousel-title">${escapeHtml(comp.title)}</div>
                        <div class="carousel-details">
                            <div><i class="bi bi-calendar-event"></i> ${formatDate(comp.date)}</div>
                            <div><i class="bi bi-geo-alt"></i> ${escapeHtml(comp.gym)}</div>
                            <div><i class="bi bi-trophy"></i> ${comp.text.competition_type}</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Add click handler to the image only (not interfering with swipe)
            const img = item.querySelector('.carousel-affiche');
            img.addEventListener('click', (e) => {
                // Only navigate on click, not on drag/swipe
                if (!e.target.dataset.dragging) {
                    window.location.href = comp.url;
                }
            });
            
            // Track dragging to prevent navigation on swipe
            let startX = 0;
            img.addEventListener('mousedown', (e) => { startX = e.clientX; });
            img.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; });
            img.addEventListener('mousemove', (e) => { 
                if (Math.abs(e.clientX - startX) > 10) img.dataset.dragging = 'true';
            });
            img.addEventListener('touchmove', (e) => { 
                if (Math.abs(e.touches[0].clientX - startX) > 10) img.dataset.dragging = 'true';
            });
            img.addEventListener('mouseup', () => { setTimeout(() => delete img.dataset.dragging, 100); });
            img.addEventListener('touchend', () => { setTimeout(() => delete img.dataset.dragging, 100); });
            
            inner.appendChild(item);
            
            // Create indicator
            const indicator = document.createElement('button');
            indicator.type = 'button';
            indicator.setAttribute('data-bs-target', '#competitionCarousel');
            indicator.setAttribute('data-bs-slide-to', index);
            if (index === defaultActiveIndex) indicator.className = 'active';
            indicators.appendChild(indicator);
        });
    }
    
    // Fetch and aggregate club rankings
    async function updateLeaderboard() {
        const content = document.getElementById('leaderboardContent');
        const filtered = state.filteredCompetitions;
        
        if (filtered.length === 0) {
            content.innerHTML = '<div class="leaderboard-empty" data-translate-key="no_competitions_leaderboard">No competitions to display leaderboard</div>';
            return;
        }
        
        content.innerHTML = '<div class="loading-spinner"><div class="spinner-border text-success" role="status"></div></div>';
        
        try {
            // Fetch rankings for all filtered competitions
            const rankingsPromises = filtered.map(comp => 
                apiFetchJson(`/api1/competition/${comp.id}/rankings`)
                    .catch(() => ({ club: [] }))
            );
            
            const allRankings = await Promise.all(rankingsPromises);
            
            // Aggregate club totals
            const clubTotals = {};
            allRankings.forEach(ranking => {
                if (ranking.club) {
                    ranking.club.forEach(clubData => {
                        const name = clubData.name;
                        if (!clubTotals[name]) {
                            clubTotals[name] = { name, F: 0, FC: 0, M: 0, MC: 0, TOTAL: 0, competitions: 0 };
                        }
                        clubTotals[name].F += clubData.F || 0;
                        clubTotals[name].FC += clubData.FC || 0;
                        clubTotals[name].M += clubData.M || 0;
                        clubTotals[name].MC += clubData.MC || 0;
                        clubTotals[name].TOTAL += clubData.TOTAL || 0;
                        clubTotals[name].competitions++;
                    });
                }
            });
            
            // Convert to array and sort by TOTAL
            const sortedClubs = Object.values(clubTotals)
                .sort((a, b) => b.TOTAL - a.TOTAL)
                .slice(0, 10); // Top 10
            
            if (sortedClubs.length === 0) {
                content.innerHTML = '<div class="leaderboard-empty" data-translate-key="no_club_rankings">No club rankings available</div>';
                return;
            }
            
            // Render table
            let tableHTML = `
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th data-translate-key="rank">Rank</th>
                            <th data-translate-key="club">Club</th>
                            <th>F</th>
                            <th>FC</th>
                            <th>M</th>
                            <th>MC</th>
                            <th>TOTAL</th>
                            <th data-translate-key="events">Events</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            sortedClubs.forEach((club, index) => {
                tableHTML += `
                    <tr>
                        <td class="leaderboard-rank">${index + 1}</td>
                        <td>${escapeHtml(club.name)}</td>
                        <td>${club.F}</td>
                        <td>${club.FC}</td>
                        <td>${club.M}</td>
                        <td>${club.MC}</td>
                        <td><strong>${club.TOTAL}</strong></td>
                        <td>${club.competitions}</td>
                    </tr>
                `;
            });
            
            tableHTML += '</tbody></table>';
            content.innerHTML = tableHTML;
            
        } catch (error) {
            console.error('Error loading leaderboard:', error);
            content.innerHTML = '<div class="leaderboard-empty" data-translate-key="error_loading_leaderboard">Error loading leaderboard data</div>';
        }
    }
    
    // Render competition grid
    function updateCompetitionGrid() {
        const grid = document.getElementById('competitionsGrid');
        const competitions = state.filteredCompetitions
            .sort((a, b) => new Date(b.date) - new Date(a.date)); // Most recent first
        
        if (competitions.length === 0) {
            grid.innerHTML = '<div class="empty-state"><h4 data-translate-key="no_competitions_found">No competitions found</h4><p data-translate-key="try_adjusting_filters">Try adjusting your filters</p></div>';
            return;
        }
        
        grid.innerHTML = '';
        competitions.forEach(comp => {
            const card = document.createElement('div');
            card.className = 'competition-card';
            card.onclick = () => window.location.href = comp.url;
            
            const badgeClass = comp.competition_type === 'adult' ? 'adult' : 'ado';
            const statusText = comp.text.status || '';
            
            card.innerHTML = `
                <img src="/image/${comp.id}" class="competition-affiche" alt="${escapeHtml(comp.title)}" onerror="this.src='/public/images/placeholder-competition.jpg'">
                <div class="competition-body">
                    <div class="competition-title">${escapeHtml(comp.title)}</div>
                    <div class="competition-meta"><i class="bi bi-calendar-event"></i> ${formatDate(comp.date)}</div>
                    <div class="competition-meta"><i class="bi bi-geo-alt"></i> ${escapeHtml(comp.gym)}</div>
                    <span class="competition-badge ${badgeClass}">${comp.text.competition_type}</span>
                    ${statusText ? `<span class="competition-badge">${escapeHtml(statusText)}</span>` : ''}
                </div>
            `;
            grid.appendChild(card);
        });
    }
    
    // Update all dashboard sections
    async function updateDashboard() {
        filterCompetitions();
        await updateCarousel();
        await updateLeaderboard();
        updateCompetitionGrid();
    }
    
    // Initialize filters
    function initializeFilters() {
        // Populate season dropdown
        const seasonSelect = document.getElementById('seasonFilter');
        seasonSelect.innerHTML = '<option value="all">All Seasons</option>';
        state.seasons.forEach(season => {
            const option = document.createElement('option');
            option.value = season;
            option.textContent = season;
            seasonSelect.appendChild(option);
        });
        
        // Set default to current season
        const today = new Date();
        const currentSeason = computeSeason(today.toISOString().split('T')[0]);
        if (state.seasons.includes(currentSeason)) {
            seasonSelect.value = currentSeason;
            state.currentSeason = currentSeason;
        }
        
        // Season change handler
        seasonSelect.addEventListener('change', (e) => {
            state.currentSeason = e.target.value;
            updateDashboard();
        });
        
        // Type toggle handlers
        document.querySelectorAll('.type-toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.type-toggle-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                state.currentType = e.target.dataset.type;
                updateDashboard();
            });
        });
    }
    
    // Utility functions
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function formatDate(dateStr) {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }
    
    // Load data and initialize
    async function initialize() {
        try {
            const competitions = await apiFetchJson('/api1/competition/list');
            state.allCompetitions = competitions;
            state.seasons = extractSeasons(competitions);
            
            initializeFilters();
            await updateDashboard();
            
        } catch (error) {
            console.error('Error loading competitions:', error);
            document.querySelector('.dashboard-container').innerHTML = 
                '<div class="empty-state"><h3 data-translate-key="error_loading_dashboard">Error loading dashboard</h3><p data-translate-key="please_try_again">Please try again later</p></div>';
        }
    }
    
    // Start when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }
    
})();
</script>

{% endblock %}
